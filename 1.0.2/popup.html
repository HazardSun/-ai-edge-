<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 翻译助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-topbar">
      <div class="popup-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4285f4" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="popup-brand">AI 翻译助手</span>
      <button class="popup-settings-btn" id="openSettings" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
    <div class="popup-lang-row">
      <label for="popupTargetLang">目标语言</label>
      <select id="popupTargetLang">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁体中文</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="fr">法语</option>
        <option value="de">德语</option>
        <option value="es">西班牙语</option>
        <option value="pt">葡萄牙语</option>
        <option value="ru">俄语</option>
        <option value="ar">阿拉伯语</option>
        <option value="hi">印地语</option>
        <option value="th">泰语</option>
        <option value="vi">越南语</option>
        <option value="it">意大利语</option>
        <option value="nl">荷兰语</option>
        <option value="pl">波兰语</option>
        <option value="tr">土耳其语</option>
        <option value="id">印尼语</option>
        <option value="ms">马来语</option>
      </select>
    </div>
    <div class="popup-input-area">
      <textarea id="popupInputText" placeholder="输入要翻译的文本..." rows="4"></textarea>
    </div>
    <div class="popup-shortcut-hint">Ctrl+Enter ↵</div>
    <div class="popup-btn-row">
      <button class="popup-btn-clear" id="clearBtn">清空</button>
      <button class="popup-btn-primary" id="translateBtn">翻译</button>
    </div>
    <div id="popupResult" class="popup-result-area" style="display:none;">
      <div class="popup-result-header">
        <span>翻译中...</span>
        <div class="popup-result-actions">
          <button class="popup-result-save" id="popupSaveBtn" title="收藏到单词本">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button class="popup-result-copy" id="popupCopyBtn" title="复制">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div id="popupResultText" class="popup-result-text"></div>
    </div>
    <div id="popupStatus" class="popup-status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
